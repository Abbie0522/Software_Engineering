<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Register System</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }

    .container{
      width:380px;
      background:white;
      padding:35px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      color:#555;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-group input:focus{
      border-color:#7c3aed;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#7c3aed;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#5b21b6;
    }

    .switch{
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    .switch span{
      color:#7c3aed;
      cursor:pointer;
      font-weight:bold;
    }

    .message{
      margin-bottom:15px;
      text-align:center;
      font-size:14px;
      font-weight:bold;
    }

    .success{
      color:green;
    }

    .error{
      color:red;
    }

    #registerForm{
      display:none;
    }

    .dashboard{
      display:none;
      text-align:center;
    }

    .dashboard h1{
      margin-bottom:15px;
      color:#333;
    }

    .dashboard p{
      margin-bottom:20px;
      color:#555;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGIN FORM -->
    <div id="loginForm">

      <h2>Login</h2>

      <div class="message" id="loginMessage"></div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
      </div>

      <button>Login</button>

      <div class="switch">
        Don't have an account?
        <span onclick="showRegister()">Register</span>
      </div>

    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm">

      <h2>Register</h2>

      <div class="message" id="registerMessage"></div>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="registerUsername" placeholder="Enter username">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="registerEmail" placeholder="Enter email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="registerPassword" placeholder="Enter password">
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password">
      </div>

      <button>Register</button>

      <div class="switch">
        Already have an account?
        <span onclick="showLogin()">Login</span>
      </div>

    </div>

  </div>

  <script>
    // CHECK LOGIN STATUS
    window.onload = function(){

      let loggedInUser = localStorage.getItem("loggedInUser");

      if(loggedInUser){
        showDashboard(loggedInUser);
      }

    };

    // SHOW REGISTER
    function showRegister(){

      document.getElementById("loginForm").style.display = "none";
      document.getElementById("registerForm").style.display = "block";

    }

    // SHOW LOGIN
    function showLogin(){

      document.getElementById("registerForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";

    }

    // REGISTER FUNCTION
    function register(){

      let username = document.getElementById("registerUsername").value;
      let email = document.getElementById("registerEmail").value;
      let password = document.getElementById("registerPassword").value;
      let confirmPassword = document.getElementById("confirmPassword").value;

      let message = document.getElementById("registerMessage");

      if(username === "" || email === "" || password === "" || confirmPassword === ""){

        message.innerHTML = "Please fill in all fields";
        message.className = "message error";
        return;

      }

      if(password.length < 6){

        message.innerHTML = "Password must be at least 6 characters";
        message.className = "message error";
        return;

      }

      if(password !== confirmPassword){

        message.innerHTML = "Passwords do not match";
        message.className = "message error";
        return;

      }

      // SAVE TO LOCALSTORAGE
      localStorage.setItem("username", username);
      localStorage.setItem("email", email);
      localStorage.setItem("password", password);

      message.innerHTML = "Register successful!";
      message.className = "message success";

      // CLEAR INPUT
      document.getElementById("registerUsername").value = "";
      document.getElementById("registerEmail").value = "";
      document.getElementById("registerPassword").value = "";
      document.getElementById("confirmPassword").value = "";

      setTimeout(() => {

        showLogin();

      }, 1000);

    }

    // LOGIN FUNCTION
    function login(){

      let email = document.getElementById("loginEmail").value;
      let password = document.getElementById("loginPassword").value;

      let savedEmail = localStorage.getItem("email");
      let savedPassword = localStorage.getItem("password");
      let savedUsername = localStorage.getItem("username");

      let message = document.getElementById("loginMessage");

      // DEMO ACCOUNT
      if(
        (email === savedEmail && password === savedPassword) ||
        (email === "admin@gmail.com" && password === "123456")
      ){

        let currentUser =
          email === "admin@gmail.com"
          ? "Admin"
          : savedUsername;

        localStorage.setItem("loggedInUser", currentUser);

        showDashboard(currentUser);

      }else{

        message.innerHTML = "Invalid email or password";
        message.className = "message error";

      }

    }
  </script>

</body>
</html>
